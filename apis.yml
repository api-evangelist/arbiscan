aid: arbiscan
name: Arbiscan
description: >-
  Arbiscan is the official blockchain explorer, search, API, and analytics platform for Arbitrum One,
  the leading Ethereum Layer 2 scaling network. It enables developers and users to query Arbitrum One
  transaction histories, token transfers (ERC-20, ERC-721, ERC-1155), smart contract source code and ABIs,
  block data, and L2 network statistics. The Arbiscan API is part of the Etherscan unified V2 platform,
  accessible across 60+ EVM-compatible chains with a single API key. A free tier provides 100,000 daily
  calls at 3 requests per second; paid tiers scale up to enterprise with unmetered access.
