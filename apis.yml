apis:
  - aid: arbiscan:arbiscan
    name: Arbiscan API
    description: >-
      The Arbiscan API provides programmatic access to Arbitrum One blockchain data, including account
      balances, transaction histories, internal transactions, ERC-20/ERC-721/ERC-1155 token transfers,
      smart contract verification and ABI retrieval, block rewards, event logs, and L2 network statistics
      such as gas prices and total supply. Powered by the Etherscan V2 unified platform with chainid 42161
      for Arbitrum One, a single API key works across all supported EVM networks.
