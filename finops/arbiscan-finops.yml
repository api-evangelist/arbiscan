specification: FinOps Framework
specificationVersion: '1.0'
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Arbiscan
providerId: arbiscan
publisherName: Arbiscan
serviceCategory: API
created: '2026-06-13'
modified: '2026-06-13'
tags:
  - Blockchain
  - Cryptocurrency
  - Arbitrum
  - Layer 2
  - EVM
  - Web3
  - FinOps
  - Cost Management
  - FOCUS
description: >-
  FinOps framework definition for the Arbiscan API surface. Provides a FOCUS-aligned mapping for cost
  allocation, usage measurement, and unit-economics reporting for teams consuming Arbitrum One blockchain
  data via the Etherscan V2 unified platform. Arbiscan API billing flows through Etherscan's Stripe-based
  subscription system with monthly auto-renewal.
principles:
  - name: Visibility
    description: >-
      Make Arbiscan API consumption costs visible to engineering, product, and finance teams in near
      real-time, including daily call volume against quota for each pricing tier.
  - name: Allocation
    description: >-
      Tag every chargeable API call with the consuming team, environment, application, and feature so
      cost can be allocated across teams querying Arbitrum One blockchain data.
  - name: Optimization
    description: >-
      Continuously evaluate request patterns, caching, batching, and tier selection to reduce cost per
      useful unit of blockchain data retrieved. Consider multicall batching and response caching where
      Arbitrum data is re-queried frequently.
  - name: Accountability
    description: >-
      Establish budget owners and chargeback or showback flows for each team consuming Arbiscan API
      capacity, aligned to the Etherscan V2 subscription tier in use.
domains:
  - name: Understand Usage and Cost
    capabilities:
      - Data Ingestion
      - Allocation
      - Reporting and Analytics
      - Anomaly Management
  - name: Quantify Business Value
    capabilities:
      - Planning and Estimating
      - Forecasting
      - Budgeting
      - Benchmarking
      - Unit Economics
  - name: Optimize Usage and Cost
    capabilities:
      - Architecting for Cloud
      - Rate Optimization
      - Workload Optimization
      - Cloud Sustainability
      - Licensing and SaaS
  - name: Manage the FinOps Practice
    capabilities:
      - FinOps Practice Operations
      - FinOps Education and Enablement
      - Invoicing and Chargeback
      - Onboarding Workloads
      - Intersecting Disciplines
billingModel:
  pricingCategory: Usage-Based
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Credit
    - Adjustment
  chargeFrequency: Recurring
  renewalMechanism: Stripe auto-renewal; cancel before renewal date to avoid next billing cycle
focusColumns:
  ServiceName: Arbiscan
  ServiceCategory: Developer Tools / API
  ProviderName: Arbiscan
  PublisherName: Arbiscan
  InvoiceIssuerName: Etherscan (Arbiscan parent platform)
  PricingCategory: Usage-Based
  PricingUnit: request
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: api_requests
    description: Count of billable API requests to the Arbiscan (Arbitrum One, chainid 42161) endpoint
    unit: request
    aggregation: sum
    dimensions:
      - api
      - endpoint
      - tier
      - chain_id
      - consumer
  - name: daily_quota_utilization
    description: Percentage of daily call quota consumed, tracked per API key per tier
    unit: percent
    aggregation: max
    dimensions:
      - api
      - tier
      - consumer
  - name: data_egress
    description: Bytes returned over the network in API responses
    unit: GB
    aggregation: sum
    dimensions:
      - api
      - region
      - consumer
apis:
  - name: Arbiscan API
    baseURL: https://api.etherscan.io/v2/api
    tags:
      - Blockchain
      - Cryptocurrency
      - Arbitrum
      - Layer 2
      - EVM
    serviceName: Arbiscan API
    serviceCategory: API
    chainId: '42161'
unitEconomics:
  - name: Cost per 1K Requests
    metric: billed_cost / (api_requests / 1000)
    target: TBD
  - name: Cost per Active Consumer
    metric: billed_cost / active_consumers
    target: TBD
  - name: Daily Quota Efficiency
    metric: api_requests / daily_quota_limit
    target: '>0.5'
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
