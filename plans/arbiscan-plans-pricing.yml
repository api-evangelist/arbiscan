description: >-
  Machine-readable plans and pricing for the Arbiscan API, part of the Etherscan unified V2 platform.
  Arbiscan API subscriptions are managed through Etherscan's plan system with chainid 42161 for Arbitrum One.
  Prices and limits reflect the Etherscan V2 published plan tiers as of June 2026.
plans:
  - id: arbiscan-free
    name: Free
    type: freemium
    description: >-
      Free community tier for the Arbiscan API. Supports selected chains including Arbitrum One.
      Requires attribution. Suited for evaluation, prototyping, and low-volume integrations.
    entries:
      - label: Daily API Calls
        description: Maximum API calls per day on the free tier
        name: daily_calls
        type: quota
        metric: requests
        limit: 100000
        timeFrame: day
        geo: global
        domains:
          - https://api.etherscan.io/v2/api
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Rate Limit
        description: Maximum requests per second on the free tier
        name: rate_limit
        type: rate
        metric: requests_per_second
        limit: 3
        timeFrame: second
        geo: global
        domains:
          - https://api.etherscan.io/v2/api
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
